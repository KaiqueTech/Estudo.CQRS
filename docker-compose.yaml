services:
  SnackGestor.Postgres:
    image: postgres:15
    container_name: postgres_snackgestor
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: snackgestorDB
    ports:
    - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always


volumes:
  pgdata: